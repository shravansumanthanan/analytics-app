name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Jobs run in parallel — lint/typecheck/build are independent
  lint-and-typecheck:
    name: Lint & Type Check (Backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  build:
    name: Build (Backend)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Security audit
        # Warn only — don't block on transitive vulnerabilities outside our control
        run: npm audit --audit-level=high || true

  frontend-build:
    name: Build (Frontend)
    runs-on: ubuntu-latest
    # Only run if frontend directory exists
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Check frontend exists
        id: check_frontend
        run: test -f package.json && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        if: steps.check_frontend.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.check_frontend.outputs.exists == 'true'
        run: npm ci

      - name: Type check
        if: steps.check_frontend.outputs.exists == 'true'
        run: npx tsc --noEmit

      - name: Build
        if: steps.check_frontend.outputs.exists == 'true'
        run: npm run build
