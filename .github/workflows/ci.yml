name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-quality-gate:
    name: Quality Gate (Backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint & Type check
        run: npm run lint

      - name: Unit Tests
        run: npm test
        env:
          MONGODB_URI: mongodb://localhost:27017/dummy
          ADMIN_PASSWORD: supersecret

      - name: Build
        run: npm run build

      - name: Security audit
        # Warn only — don't block on transitive vulnerabilities outside our control
        run: npm audit --audit-level=high || true

  frontend-quality-gate:
    name: Quality Gate (Frontend)
    runs-on: ubuntu-latest
    # Only run if frontend directory exists
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Check frontend exists
        id: check_frontend
        run: test -f package.json && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        if: steps.check_frontend.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.check_frontend.outputs.exists == 'true'
        run: npm ci

      - name: Lint
        if: steps.check_frontend.outputs.exists == 'true'
        run: npm run lint

      - name: Build & Type check
        if: steps.check_frontend.outputs.exists == 'true'
        run: npm run build

  e2e-quality-gate:
    name: Quality Gate (E2E Tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/e2e

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

