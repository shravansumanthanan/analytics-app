services:
  mongodb:
    image: mongo:latest
    container_name: analytics-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - analytics-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: analytics-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGODB_URI=mongodb://mongodb:27017/analytics_db
      - ADMIN_PASSWORD=admin
      - ALLOWED_ORIGINS=http://localhost:80,http://localhost:5173
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    depends_on:
      - mongodb
    networks:
      - analytics-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: analytics-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - analytics-network

volumes:
  mongodb_data:

networks:
  analytics-network:
    driver: bridge
